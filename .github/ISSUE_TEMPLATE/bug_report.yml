name: Bug report
description: Report incorrect SQL behavior, a broken interaction, or a visual problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: query
    attributes:
      label: SQL query
      description: Paste the smallest query that reproduces the issue.
      render: sql
  - type: dropdown
    id: dataset
    attributes:
      label: Dataset
      options:
        - bank_transactions + branches
        - orders + customers
        - Not dataset-specific
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: Chrome 126 on Windows 11, or Safari on iPhone
  - type: textarea
    id: screenshots
    attributes:
      label: Additional context
      description: Add screenshots, screen recordings, or other useful details.

